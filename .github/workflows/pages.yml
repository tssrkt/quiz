name: Build and publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Normalize missing quiz IDs in the build checkout
        id: normalize
        run: |
          python tools/normalize_quiz_ids.py
          echo "source_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Validate content
        run: python tools/build_site.py --check

      - name: Build site
        run: python tools/build_site.py

      - name: Verify published catalog
        shell: python
        run: |
          import json
          from pathlib import Path

          catalog_path = Path("_site/data/catalog.json")
          if not catalog_path.is_file():
              raise SystemExit(f"Missing generated catalog: {catalog_path}")

          try:
              catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as error:
              raise SystemExit(f"Invalid generated catalog: {error}") from error

          source_path = Path("data/quizzes/horse-colors.json")
          try:
              source_quiz = json.loads(source_path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as error:
              raise SystemExit(f"Invalid source quiz horse-colors: {error}") from error

          questions = source_quiz.get("questions")
          if not isinstance(questions, list):
              raise SystemExit("Invalid source quiz horse-colors: questions must be a list")
          expected_count = len(questions)

          quizzes = catalog.get("quizzes")
          if not isinstance(quizzes, list):
              raise SystemExit("Invalid generated catalog: catalog.quizzes must be a list")
          horse = next((quiz for quiz in quizzes if isinstance(quiz, dict) and quiz.get("slug") == "horse-colors"), None)
          if horse is None:
              raise SystemExit("Published quiz horse-colors is missing from the generated catalog")
          if horse.get("question_count") != expected_count or not horse.get("content_version"):
              raise SystemExit("Published quiz horse-colors has an unexpected count or missing content version")

      - name: Prepare deployment repository
        working-directory: _site
        env:
          SOURCE_SHA: ${{ steps.normalize.outputs.source_sha }}
        run: |
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${SOURCE_SHA}"

      - name: Check that this is still the latest main commit
        id: freshness
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" = "${SOURCE_SHA}" ]; then
            echo "current=true" >> "${GITHUB_OUTPUT}"
          else
            echo "current=false" >> "${GITHUB_OUTPUT}"
            echo "A newer main commit exists; skipping this stale deployment."
          fi
        env:
          SOURCE_SHA: ${{ steps.normalize.outputs.source_sha }}

      - name: Replace gh-pages with the new build
        if: steps.freshness.outputs.current == 'true'
        working-directory: _site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:gh-pages
